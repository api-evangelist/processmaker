openapi: 3.0.0
info:
  title: ProcessMaker Platform RESTful API
  description: >
    The ProcessMaker Platform RESTful API provides programmatic access to all
    platform functionality including process design, case management, task
    handling, user management, and enterprise integrations. The API is BPMN 2.0
    compliant and follows the OpenAPI specification with interactive Swagger UI
    documentation auto-generated by Swagger/L5-Swagger.
  version: 1.0.0
  contact:
    email: info@processmaker.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://{organization}.processmaker.net/api/1.0
    description: ProcessMaker Cloud instance
    variables:
      organization:
        default: myorg
        description: Your ProcessMaker organization subdomain
security:
  - bearerAuth: []
tags:
  - name: Processes
    description: BPMN 2.0 process design and management
  - name: Requests
    description: Process request (case) management
  - name: Tasks
    description: Task and token management
  - name: Users
    description: User account management
  - name: Groups
    description: Group and membership management
  - name: Screens
    description: Form screen design and management
  - name: Scripts
    description: Script management for process automation
  - name: Environment Variables
    description: Environment variable management
  - name: Files
    description: File and media management
  - name: Notifications
    description: Notification management
  - name: Settings
    description: System settings management
paths:
  /processes:
    get:
      tags:
        - Processes
      summary: Returns all processes that the user has access to
      operationId: getProcesses
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_by'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/include'
        - name: simplified_data_for_selector
          in: query
          description: Return simplified data for process selector UI
          schema:
            type: boolean
      responses:
        '200':
          description: List of processes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessCollection'
    post:
      tags:
        - Processes
      summary: Save a new process
      operationId: createProcess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessEditable'
      responses:
        '201':
          description: Process created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
        '422':
          $ref: '#/components/responses/422'
  /processes/{processId}:
    get:
      tags:
        - Processes
      summary: Get single process by ID
      operationId: getProcessById
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/include'
      responses:
        '200':
          description: Single process resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Processes
      summary: Update a process
      operationId: updateProcess
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessEditable'
      responses:
        '200':
          description: Updated process resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
    delete:
      tags:
        - Processes
      summary: Delete a process
      operationId: deleteProcess
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No content
        '404':
          $ref: '#/components/responses/404'
  /processes/{processId}/draft:
    put:
      tags:
        - Processes
      summary: Update a draft process
      operationId: updateDraftProcess
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessEditable'
      responses:
        '200':
          description: Updated draft process resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
  /processes/{processId}/restore:
    put:
      tags:
        - Processes
      summary: Restore an inactive process
      operationId: restoreProcess
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Restored process resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
  /processes/{processId}/export:
    post:
      tags:
        - Processes
      summary: Export a single process by ID and return a URL to download it
      operationId: exportProcess
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Export URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
  /processes/import:
    post:
      tags:
        - Processes
      summary: Import a new process
      operationId: importProcess
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Process import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessImport'
  /processes/import/validation:
    post:
      tags:
        - Processes
      summary: Validate a process import file
      operationId: validateImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessImport'
  /processes/{processId}/start_events:
    get:
      tags:
        - Processes
      summary: Get start events of a process by ID
      operationId: getStartEventsProcessById
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/include'
      responses:
        '200':
          description: Collection of process start events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
  /processes/{processId}/bpmn:
    get:
      tags:
        - Processes
      summary: Download the BPMN definition of a process
      operationId: processBpmn
      parameters:
        - name: processId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: BPMN download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
  /start_processes:
    get:
      tags:
        - Processes
      summary: Returns the list of processes that the user can start
      operationId: startProcesses
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_by'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/include'
        - name: without_event_definitions
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Processes with start events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessCollection'
  /process_events/{process_id}:
    post:
      tags:
        - Processes
      summary: Start a new process
      operationId: triggerStartEvent
      parameters:
        - name: process_id
          in: path
          required: true
          schema:
            type: integer
        - name: event
          in: query
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Optional request data
      responses:
        '200':
          description: New process request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessRequest'
  /requests:
    get:
      tags:
        - Requests
      summary: Returns all process requests
      operationId: getProcessesRequests
      parameters:
        - name: type
          in: query
          description: Filter by status
          schema:
            type: string
            enum:
              - all
              - in_progress
              - completed
              - started_me
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_by'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/include'
      responses:
        '200':
          description: List of process requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessRequestCollection'
  /requests/{process_request_id}:
    get:
      tags:
        - Requests
      summary: Get single process request by ID
      operationId: getProcessRequestById
      parameters:
        - name: process_request_id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/include'
      responses:
        '200':
          description: Single process request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessRequest'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Requests
      summary: Update a process request
      operationId: updateProcessRequest
      parameters:
        - name: process_request_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessRequestEditable'
      responses:
        '204':
          description: No content
        '404':
          $ref: '#/components/responses/404'
    delete:
      tags:
        - Requests
      summary: Delete a process request
      operationId: deleteProcessRequest
      parameters:
        - name: process_request_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No content
        '404':
          $ref: '#/components/responses/404'
  /requests/{process_request_id}/events/{event_id}:
    post:
      tags:
        - Requests
      summary: Trigger an intermediate catch event in a process request
      operationId: updateProcessRequestEvent
      parameters:
        - name: process_request_id
          in: path
          required: true
          schema:
            type: string
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Event triggered successfully
  /tasks:
    get:
      tags:
        - Tasks
      summary: Returns all tasks
      operationId: getTasks
      parameters:
        - name: process_request_id
          in: query
          schema:
            type: integer
        - name: all_tasks
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_by'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/include'
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCollection'
  /tasks/{task_id}:
    get:
      tags:
        - Tasks
      summary: Get task by ID
      operationId: getTasksById
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/include'
      responses:
        '200':
          description: Single task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Tasks
      summary: Update a task
      operationId: updateTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: COMPLETED
                data:
                  type: object
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
  /users:
    get:
      tags:
        - Users
      summary: Returns all users
      operationId: getUsers
      parameters:
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_by'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/include'
        - name: exclude_ids
          in: query
          description: Comma-separated user IDs to exclude
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
    post:
      tags:
        - Users
      summary: Save a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEditable'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/422'
  /users/{user_id}:
    get:
      tags:
        - Users
      summary: Get single user by ID
      operationId: getUserById
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Single user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Users
      summary: Update a user
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEditable'
      responses:
        '204':
          description: No content
        '404':
          $ref: '#/components/responses/404'
    delete:
      tags:
        - Users
      summary: Delete a user
      operationId: deleteUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No content
        '404':
          $ref: '#/components/responses/404'
  /users/restore:
    put:
      tags:
        - Users
      summary: Restore a soft deleted user
      operationId: restoreUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
      responses:
        '200':
          description: Success
  /users_task_count:
    get:
      tags:
        - Users
      summary: Returns all users and their total tasks
      operationId: getUsersTaskCount
      parameters:
        - $ref: '#/components/parameters/filter'
        - name: include_ids
          in: query
          description: Comma-separated user IDs to include
          schema:
            type: string
      responses:
        '200':
          description: Users with task counts
          content:
            application/json:
              schema:
                type: object
  /groups:
    get:
      tags:
        - Groups
      summary: Returns all groups that the user has access to
      operationId: getGroups
      parameters:
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_by'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/include'
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupCollection'
    post:
      tags:
        - Groups
      summary: Save a new group
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupEditable'
      responses:
        '201':
          description: Created group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '422':
          $ref: '#/components/responses/422'
  /groups/{group_id}:
    get:
      tags:
        - Groups
      summary: Get single group by ID
      operationId: getGroupById
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Single group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Groups
      summary: Update a group
      operationId: updateGroup
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupEditable'
      responses:
        '204':
          description: No content
        '404':
          $ref: '#/components/responses/404'
    delete:
      tags:
        - Groups
      summary: Delete a group
      operationId: deleteGroup
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No content
        '404':
          $ref: '#/components/responses/404'
  /groups/{group_id}/users:
    get:
      tags:
        - Groups
      summary: Returns all users of a group
      operationId: getGroupUsers
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Users in group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
  /groups/{group_id}/groups:
    get:
      tags:
        - Groups
      summary: Returns all sub-groups of a group
      operationId: getGroupGroups
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Sub-groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupCollection'
  /screens:
    get:
      tags:
        - Screens
      summary: Returns all screens that the user has access to
      operationId: getScreens
      parameters:
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/order_by'
        - $ref: '#/components/parameters/order_direction'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/include'
        - name: exclude
          in: query
          description: Comma-separated fields to exclude from response
          schema:
            type: string
      responses:
        '200':
          description: List of screens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenCollection'
    post:
      tags:
        - Screens
      summary: Save a new screen
      operationId: createScreen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenEditable'
      responses:
        '201':
          description: Created screen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /screens/{screens_id}:
    get:
      tags:
        - Screens
      summary: Get single screen by ID
      operationId: getScreensById
      parameters:
        - name: screens_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single screen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
    put:
      tags:
        - Screens
      summary: Update a screen
      operationId: updateScreen
      parameters:
        - name: screens_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenEditable'
      responses:
        '204':
          description: No content
    delete:
      tags:
        - Screens
      summary: Delete a screen
      operationId: deleteScreen
      parameters:
        - name: screens_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No content
  /screens/{screens_id}/draft:
    put:
      tags:
        - Screens
      summary: Update a draft screen
      operationId: updateDraftScreen
      parameters:
        - name: screens_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenEditable'
      responses:
        '204':
          description: No content
  /screens/{screens_id}/duplicate:
    put:
      tags:
        - Screens
      summary: Duplicate a screen
      operationId: duplicateScreen
      parameters:
        - name: screens_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenEditable'
      responses:
        '201':
          description: Duplicated screen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /screens/{screensId}/export:
    post:
      tags:
        - Screens
      summary: Export a single screen by ID
      operationId: exportScreen
      parameters:
        - name: screensId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Screen export URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
  /screens/import:
    post:
      tags:
        - Screens
      summary: Import a new screen
      operationId: importScreen
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Import status
  /screens/preview:
    post:
      tags:
        - Screens
      summary: Preview a screen
      operationId: preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                watchers:
                  type: array
                  items:
                    type: object
                computed:
                  type: array
                  items:
                    type: object
                custom_css:
                  type: string
      responses:
        '200':
          description: Screen preview resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /screens/{screen_id}/translate/{language}:
    get:
      tags:
        - Screens
      summary: Translates the screen to the desired language
      operationId: translateScreen
      parameters:
        - name: screen_id
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Translated screen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Screen'
  /environment-variables:
    get:
      tags:
