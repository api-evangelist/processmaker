components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    filter:
      name: filter
      in: query
      description: >
        Filter results by string. Searches Name, Description, and Status.
        Status must match exactly. Others can be a substring.
      schema:
        type: string
    order_by:
      name: order_by
      in: query
      description: Field to order results by
      schema:
        type: string
    order_direction:
      name: order_direction
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc
    per_page:
      name: per_page
      in: query
      schema:
        type: integer
        default: 10
    status:
      name: status
      in: query
      description: Filter by status - ACTIVE or INACTIVE
      schema:
        type: string
        enum:
          - ACTIVE
          - INACTIVE
    include:
      name: include
      in: query
      description: Include data from related models in payload. Comma separated list.
      schema:
        type: string
        default: ''
  responses:
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '422':
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: object
  schemas:
    Metadata:
      type: object
      properties:
        total:
          type: integer
        count:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        total_pages:
          type: integer
        sort_by:
          type: string
        sort_order:
          type: string
        search:
          type: string
    ProcessEditable:
      type: object
      required:
        - name
        - status
        - bpmn
        - process_category_id
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        bpmn:
          type: string
          description: BPMN 2.0 XML string
        process_category_id:
          type: integer
        manager_id:
          type: integer
        cancel_screen_id:
          type: integer
        request_detail_screen_id:
          type: integer
        is_valid:
          type: boolean
        warnings:
          type: array
          items:
            type: string
    Process:
      allOf:
        - $ref: '#/components/schemas/ProcessEditable'
        - type: object
          properties:
            id:
              type: integer
            user_id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            deleted_at:
              type: string
              format: date-time
              nullable: true
    ProcessCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Process'
        meta:
          $ref: '#/components/schemas/Metadata'
    ProcessImport:
      type: object
      properties:
        status:
          type: object
        assignable:
          type: array
          items:
            type: object
        process:
          $ref: '#/components/schemas/Process'
    ProcessRequestEditable:
      type: object
      properties:
        status:
          type: string
          enum:
            - ACTIVE
            - COMPLETED
            - ERROR
            - CANCELED
        data:
          type: object
        name:
          type: string
    ProcessRequest:
      allOf:
        - $ref: '#/components/schemas/ProcessRequestEditable'
        - type: object
          properties:
            id:
              type: integer
            process_id:
              type: integer
            user_id:
              type: integer
            process_collaboration_id:
              type: integer
              nullable: true
            callable_id:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            completed_at:
              type: string
              format: date-time
              nullable: true
    ProcessRequestCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProcessRequest'
        meta:
          $ref: '#/components/schemas/Metadata'
    Task:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - CLOSED
            - TRIGGERED
        element_id:
          type: string
        element_type:
          type: string
        element_name:
          type: string
        process_id:
          type: integer
